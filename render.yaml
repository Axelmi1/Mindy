services:
  - type: web
    name: mindy-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: |
      cd ../shared && npm install --include=dev --legacy-peer-deps && npm run build && \
      cd ../server && npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/prisma generate && npm run build && ./node_modules/.bin/prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /api/docs
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "10000"
