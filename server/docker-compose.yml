version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mindy-db
    restart: always
    environment:
      POSTGRES_USER: user_mindy
      POSTGRES_PASSWORD: password_mindy
      POSTGRES_DB: mindy_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: